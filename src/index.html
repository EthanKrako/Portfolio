<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./color-schemes/mauve.css">
    <script type="module" src="./script.js" defer></script>
</head>
<body>
    <div class="header">
        <div class="header-name">Ethan Krakowski</div>
        <button id="language-button" class="pill-button" data-text="lang-abv"></button>
    </div>
    <main>
        <div class="hero">
            <div class="text-container">
                <h1 data-text="hero-title"></h1>
                <div class="hero-subtitle" data-text="hero-subtitle"></div>
                <div class="hero-subtitle" data-text="hero-subtitle-2"></div>
            </div>
            <img class="profile-picture" src="./images/profile-picture.png" data-alt="profile picture">
        </div>

        <div class="content-container">
            <h1 class="project-title" data-text="project-title"></h1>
            <div class="projects-container">
                <div class="tabs">
                    <input type="radio" id="radio-pro" name="project-tabs" data-list="pro-list" checked>
                    <label for="radio-pro" data-text="project-pro"></label>

                    <input type="radio" id="radio-perso" name="project-tabs" data-list="perso-list">
                    <label for="radio-perso" data-text="project-perso"></label>
                </div>
                <div class="project-lists">
                    <div class="pro-list list is-active">
                        <div class="project-container">
                            <div class="project-description" data-text="pro-desc-1">

                            </div>
                            <button popovertarget="pro-image-1">
                                <img src="./images/profile-picture.png" alt="Project screenshot">
                            </button>
                            <img id="pro-image-1" class="fullscreen-image" src="./images/profile-picture.png" alt="Fullsize project screenshot" popover>
                        </div>
                        <div class="project-container">
                            <div class="project-description" data-text="pro-desc-2">

                            </div>
                            <button popovertarget="pro-image-2">
                                <img src="./images/profile-picture.png" alt="Project screenshot">
                            </button>
                            <img id="pro-image-2" class="fullscreen-image" src="./images/profile-picture.png" alt="Fullsize project screenshot" popover>
                        </div>
                        <div class="project-container">
                            <div class="project-description" data-text="pro-desc-3">

                            </div>
                            <button popovertarget="pro-image-3">
                                <img src="./images/profile-picture.png" alt="Project screenshot">
                            </button>
                            <img id="pro-image-3" class="fullscreen-image" src="./images/profile-picture.png" alt="Fullsize project screenshot" popover>
                        </div>
                    </div>
                    <div class="perso-list list">
                        <div class="project-container">
                            <div class="project-description" data-text="perso-desc-1">

                            </div>
                            <button popovertarget="perso-image-1">
                                <img src="./images/profile-picture.png" alt="Project screenshot">
                            </button>
                            <img id="perso-image-1" class="fullscreen-image" src="./images/profile-picture.png" alt="Fullsize project screenshot" popover>
                        </div>
                        <div class="project-container">
                            <div class="project-description" data-text="perso-desc-2">

                            </div>
                            <button popovertarget="perso-image-2">
                                <img src="./images/profile-picture.png" alt="Project screenshot">
                            </button>
                            <img id="perso-image-2" class="fullscreen-image" src="./images/profile-picture.png" alt="Fullsize project screenshot" popover>
                        </div>
                        <div class="project-container">
                            <div class="project-description" data-text="perso-desc-3">

                            </div>
                            <button popovertarget="perso-image-3">
                                <img src="./images/profile-picture.png" alt="Project screenshot">
                            </button>
                            <img id="perso-image-3" class="fullscreen-image" src="./images/profile-picture.png" alt="Fullsize project screenshot" popover>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
