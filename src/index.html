<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./color-schemes/mauve.css">
    <script type="module" src="./script.js" defer></script>
</head>
<body>
    <div class="header">
        <div class="header-name">Ethan Krakowski</div>
        <button id="language-button" class="pill-button" data-text="lang-abv"></button>
    </div>
    <main>
        <div class="hero">
            <div class="text-container">
                <h1 data-text="hero-title"></h1>
                <div class="hero-subtitle" data-text="hero-subtitle"></div>
                <div class="hero-subtitle" data-text="hero-subtitle-2"></div>
            </div>
            <img class="profile-picture" src="./images/profile-picture.jpg" data-alt="profile picture">
        </div>

        <div class="content-container">
            <h1 class="project-title" data-text="project-title"></h1>
            <div class="projects-container">
                <div class="tabs">
                    <input type="radio" id="radio-pro" name="project-tabs" data-list="pro-list" checked>
                    <label for="radio-pro" data-text="project-pro"></label>

                    <input type="radio" id="radio-perso" name="project-tabs" data-list="perso-list">
                    <label for="radio-perso" data-text="project-perso"></label>

                    <div class="slider"></div>
                </div>

                <div class="project-lists">
                    <div class="pro-list list is-active">
                        <div class="project-container">
                            <div class="project-description">
                                <h2 data-text="pro-title-1"></h2>
                                <p data-text="pro-desc-1"></p>
                                <a class="project-link" href="https://odyssea-sanitaire.fr/" target="_blank" data-text="website-link"></a>
                            </div>
                            <button class="preview-container" popovertarget="pro-image-1">
                                <img src="./images/odyssea-screenshot.png" alt="Project screenshot">
                            </button>
                            <img id="pro-image-1" class="fullscreen-image" src="./images/odyssea-screenshot.png" alt="Fullsize project screenshot" popover>
                        </div>

                        <div class="project-container">
                            <div class="project-description">
                                <h2 data-text="pro-title-2"></h2>
                                <p data-text="pro-desc-2"></p>
                                <a class="project-link" href="https://www.seinesaintdenishabitat.fr/" target="_blank" data-text="website-link"></a>
                            </div>
                            <button class="preview-container" popovertarget="pro-image-2">
                                <img src="./images/ssdh-screenshot.png" alt="Project screenshot">
                            </button>
                            <img id="pro-image-2" class="fullscreen-image" src="./images/ssdh-screenshot.png" alt="Fullsize project screenshot" popover>
                        </div>

                        <div class="project-container">
                            <div class="project-description">
                                <h2 data-text="pro-title-3"></h2>
                                <p data-text="pro-desc-3"></p>
                                <a class="project-link" href="https://www.sporsora.com/" target="_blank" data-text="website-link"></a>
                            </div>
                            <button class="preview-container" popovertarget="pro-image-3">
                                <img src="./images/sporsora-screenshot.png" alt="Project screenshot">
                            </button>
                            <img id="pro-image-3" class="fullscreen-image" src="./images/sporsora-screenshot.png" alt="Fullsize project screenshot" popover>
                        </div>

                    </div>

                    <div class="perso-list list">
                        <div class="project-container">
                            <div class="project-description">
                                <h2 data-text="perso-title-1"></h2>
                                <p data-text="perso-desc-1"></p>
                                <a class="project-link" href="https://github.com/EthanKrako/JobApplicationTracker" target="_blank" data-text="github-link"></a>
                            </div>
                            <button class="preview-container" popovertarget="perso-image-1">
                                <img src="./images/jat-screenshot.png" alt="Project screenshot">
                            </button>
                            <img id="perso-image-1" class="fullscreen-image" src="./images/jat-screenshot.png" alt="Fullsize project screenshot" popover>
                        </div>

                        <div class="project-container">
                            <div class="project-description">
                                <h2 data-text="perso-title-2"></h2>
                                <p data-text="perso-desc-2"></p>
                                <a class="project-link" href="https://github.com/EthanKrako/Collaborative-Text-Editor" target="_blank" data-text="github-link"></a>
                            </div>
                            <button class="preview-container" popovertarget="perso-image-2">
                                <img src="./images/collab-editor-screenshot.png" alt="Project screenshot">
                            </button>
                            <img id="perso-image-2" class="fullscreen-image" src="./images/collab-editor-screenshot.png" alt="Fullsize project screenshot" popover>
                        </div>

                        <div class="project-container">
                            <div class="project-description">
                                <h2 data-text="perso-title-3"></h2>
                                <p data-text="perso-desc-3"></p>
                                <a class="project-link" href="https://github.com/EthanKrako/Portfolio" target="_blank" data-text="github-link"></a>
                            </div>
                            <button class="preview-container" popovertarget="perso-image-3">
                                <img src="./images/portfolio-screenshot.png" alt="Project screenshot">
                            </button>
                            <img id="perso-image-3" class="fullscreen-image" src="./images/portfolio-screenshot.png" alt="Fullsize project screenshot" popover>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
